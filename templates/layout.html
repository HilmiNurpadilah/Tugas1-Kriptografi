<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulasi Kriptografi Klasik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-shell">
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
    <div class="container py-2">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{url_for('index')}}">
        <span class="brand-mark">🔐</span>
        <span>Kriptografi Klasik</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="{{ url_for('history') }}" class="btn btn-sm btn-outline-light navbar-action">History</a>
        <button id="toggleMode" class="btn btn-sm btn-outline-light navbar-action" type="button">☀️ / 🌙</button>
      </div>
    </div>
  </nav>
  <main class="page-wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center py-4 mt-4 text-muted small">
    &copy; 2026 Kriptografi Klasik. Hilmi Nurpadilah.
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
